name: Release

on:
  workflow_dispatch:
    inputs:
      kafka_version:
        description: Kafka version to bundle into the image
        required: true
        default: "4.1.0"
      scala_version:
        description: Scala version used in the Kafka distribution artifact name
        required: true
        default: "2.13"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump minor version
        id: bump_version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm version minor --no-git-tag-version

          VERSION="$(node -p "require('./package.json').version")"

          git add package.json package-lock.json
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v${VERSION}"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Derive image coordinates
        id: image
        run: |
          IMAGE_REPOSITORY="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "repository=${IMAGE_REPOSITORY}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            KAFKA_VERSION=${{ github.event.inputs.kafka_version }}
            SCALA_VERSION=${{ github.event.inputs.scala_version }}
          tags: |
            ${{ steps.image.outputs.repository }}:${{ steps.bump_version.outputs.version }}
            ${{ steps.image.outputs.repository }}:latest
